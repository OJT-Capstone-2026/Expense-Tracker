<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>💰 Expense Tracker</h1>
  </header>

  <div class="summary">
    <div class="card card-balance">
      <p class="card-label">Balance</p>
      <p class="card-amount" id="balance">₹0.00</p>
    </div>
    <div class="card card-income">
      <p class="card-label">Total Income</p>
      <p class="card-amount" id="totalIncome">₹0.00</p>
    </div>
    <div class="card card-expense">
      <p class="card-label">Total Expenses</p>
      <p class="card-amount" id="totalExpenses">₹0.00</p>
    </div>
  </div>

  <div class="main">

    <div class="form-box">
      <h2 id="formHeading">Add Transaction</h2>

      <p class="error-msg" id="errorMsg"></p>

      <input type="hidden" id="editId" value="" />

      <label for="description">Description</label>
      <input type="text" id="description" placeholder="e.g. Salary, Groceries" />

      <label for="amount">Amount (₹)</label>
      <input type="number" id="amount" placeholder="e.g. 500" min="1" />

      <label for="type">Type</label>
      <select id="type">
        <option value="">-- Select type --</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <label for="date">Date</label>
      <input type="date" id="date" />

      <button id="submitBtn" onclick="handleFormSubmit()">Add Transaction</button>
      <button id="cancelBtn" onclick="cancelEdit()" style="display:none;">Cancel</button>
    </div>

    <div class="list-box">
      <h2>Transactions</h2>

      <p id="emptyMsg" class="empty-msg">No transactions yet. Add one!</p>

      <ul id="transactionList"></ul>
    </div>

  </div>

  <div id="deletePopup" class="popup-overlay" style="display:none;">
    <div class="popup-box">
      <p>⚠️ Are you sure you want to delete this transaction?</p>
      <button class="btn-danger" onclick="confirmDelete()">Yes, Delete</button>
      <button onclick="cancelDelete()">No, Cancel</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
